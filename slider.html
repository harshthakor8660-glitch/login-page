<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick-theme.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #17242a;
            background: #eef3f2;
        }

        .gallery-section {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 64px;
        }

        .gallery-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(23, 36, 42, 0.14);
        }

        .gallery-header h1 {
            margin: 0 0 8px;
            font-size: clamp(34px, 5vw, 58px);
            line-height: 1;
            letter-spacing: 0;
        }

        .gallery-header p {
            max-width: 420px;
            margin: 0;
            color: #526166;
            font-size: 16px;
            line-height: 1.5;
            text-align: right;
        }

        .slick-main-slider {
            margin: 0 -12px;
            padding: 8px 34px 42px;
            border: 1px solid rgba(23, 36, 42, 0.12);
            border-radius: 8px;
            background: #fff;
        }

        .gallery-slide {
            padding: 0 12px;
        }

        .gallery-card {
            position: relative;
            width: 100%;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            text-align: left;
            border: 1px solid rgba(23, 36, 42, 0.12);
            border-radius: 8px;
            background: #dfecea;
            transition: transform 180ms ease;
        }

        .gallery-card:hover,
        .gallery-card:focus-visible {
            transform: translateY(-4px);
            outline: none;
        }

        .gallery-card img {
            display: block;
            width: 100%;
            aspect-ratio: 5 / 4;
            object-fit: cover;
            background: #dfecea;
            transition: transform 220ms ease, filter 220ms ease;
        }

        .gallery-card:hover img,
        .gallery-card:focus-visible img {
            transform: scale(1.04);
            filter: saturate(1.08);
        }

        .gallery-card span {
            position: absolute;
            right: 12px;
            bottom: 12px;
            left: 12px;
            display: flex;
            min-height: 48px;
            align-items: center;
            padding: 10px 12px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            background: rgba(15, 31, 36, 0.78);
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
        }

        .slick-prev,
        .slick-next {
            z-index: 2;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #14363f;
        }

        .slick-prev:hover,
        .slick-prev:focus,
        .slick-next:hover,
        .slick-next:focus {
            background: #e46144;
        }

        .slick-prev:before,
        .slick-next:before {
            color: #fff;
            font-size: 22px;
            opacity: 1;
        }

        .slick-dots li button:before {
            color: #14363f;
            font-size: 11px;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(9, 15, 18, 0.92);
        }

        .lightbox.is-open {
            display: flex;
        }

        .lightbox-panel {
            position: relative;
            width: min(980px, 100%);
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
        }

        .lightbox-image {
            display: block;
            width: 100%;
            max-height: 78vh;
            object-fit: contain;
            border-radius: 8px;
            background: #fff;
        }

        .lightbox-caption {
            margin: 14px 0 0;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
        }

        .lightbox-button {
            position: absolute;
            display: grid;
            width: 44px;
            height: 44px;
            place-items: center;
            cursor: pointer;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 50%;
            background: #14363f;
            font-size: 24px;
            line-height: 1;
        }

        .lightbox-button:hover,
        .lightbox-button:focus-visible {
            background: #e46144;
            outline: none;
        }

        .lightbox-close {
            top: -54px;
            right: 0;
        }

        .lightbox-prev,
        .lightbox-next {
            top: 50%;
            transform: translateY(-50%);
        }

        .lightbox-prev {
            left: -58px;
        }

        .lightbox-next {
            right: -58px;
        }

        @media (max-width: 760px) {
            .gallery-section {
                width: min(100% - 20px, 1120px);
                padding-top: 30px;
            }

            .gallery-header {
                display: block;
            }

            .gallery-header p {
                text-align: left;
            }

            .slick-main-slider {
                padding-right: 10px;
                padding-left: 10px;
            }

            .lightbox {
                padding: 16px;
            }

            .lightbox-close {
                top: 10px;
                right: 10px;
            }

            .lightbox-prev,
            .lightbox-next {
                top: auto;
                bottom: -58px;
                transform: none;
            }

            .lightbox-prev {
                left: calc(50% - 52px);
            }

            .lightbox-next {
                right: calc(50% - 52px);
            }
        }
    </style>
</head>

<body>
    <main class="gallery-section">
        <div class="gallery-header">
            <h1>Lightbox Gallery</h1>
            <p>A clean illustration collection with focused previews and smooth gallery navigation.</p>
        </div>

        <div class="slick-main-slider">
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Team Performance">
                    <img src="illustration_1.png" alt="Gallery illustration 1">
                    <span>Team Performance</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Project Planning">
                    <img src="illustration_2.png" alt="Gallery illustration 2">
                    <span>Project Planning</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="People Operations">
                    <img src="illustration_3.png" alt="Gallery illustration 3">
                    <span>People Operations</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Work Dashboard">
                    <img src="illustration_4.png" alt="Gallery illustration 4">
                    <span>Work Dashboard</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Team Review">
                    <img src="illustration_5.png" alt="Gallery illustration 5">
                    <span>Team Review</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Growth Report">
                    <img src="illustration_6.png" alt="Gallery illustration 6">
                    <span>Growth Report</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Creative Direction">
                    <img src="illustration_7.png" alt="Gallery illustration 7">
                    <span>Creative Direction</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Product Ideas">
                    <img src="illustration_8.png" alt="Gallery illustration 8">
                    <span>Product Ideas</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Design Sprint">
                    <img src="illustration_9.png" alt="Gallery illustration 9">
                    <span>Design Sprint</span>
                </button>
            </div>
            <div class="gallery-slide">
                <button class="gallery-card" type="button" data-title="Launch Plan">
                    <img src="illustration_10.png" alt="Gallery illustration 10">
                    <span>Launch Plan</span>
                </button>
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
        <div class="lightbox-panel">
            <button class="lightbox-button lightbox-close" type="button" aria-label="Close preview">&times;</button>
            <button class="lightbox-button lightbox-prev" type="button" aria-label="Previous image">&#8249;</button>
            <img class="lightbox-image" src="" alt="">
            <p class="lightbox-caption"></p>
            <button class="lightbox-button lightbox-next" type="button" aria-label="Next image">&#8250;</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"></script>
    <script>
        $(document).ready(function () {
            var $cards = $('.gallery-card');
            var $lightbox = $('#lightbox');
            var $lightboxImage = $('.lightbox-image');
            var $lightboxCaption = $('.lightbox-caption');
            var $closeButton = $('.lightbox-close');
            var currentIndex = 0;

            $cards.each(function (index) {
                $(this).attr('data-index', index);
            });

            function showImage(index) {
                currentIndex = (index + $cards.length) % $cards.length;

                var $card = $cards.eq(currentIndex);
                var $image = $card.find('img');

                $lightboxImage.attr({
                    src: $image.attr('src'),
                    alt: $image.attr('alt')
                });
                $lightboxCaption.text($card.data('title'));
            }

            function openLightbox(index) {
                showImage(index);
                $lightbox.addClass('is-open');
                $('body').css('overflow', 'hidden');
                $closeButton.trigger('focus');
            }

            function closeLightbox() {
                $lightbox.removeClass('is-open');
                $('body').css('overflow', '');
                $cards.eq(currentIndex).trigger('focus');
            }

            $('.slick-main-slider').on('click', '.gallery-card', function () {
                openLightbox(Number($(this).attr('data-index')));
            });

            $closeButton.on('click', closeLightbox);

            $('.lightbox-prev').on('click', function () {
                showImage(currentIndex - 1);
            });

            $('.lightbox-next').on('click', function () {
                showImage(currentIndex + 1);
            });

            $lightbox.on('click', function (event) {
                if ($(event.target).is($lightbox)) {
                    closeLightbox();
                }
            });

            $(document).on('keydown', function (event) {
                if (!$lightbox.hasClass('is-open')) {
                    return;
                }

                if (event.key === 'Escape') {
                    closeLightbox();
                }

                if (event.key === 'ArrowLeft') {
                    showImage(currentIndex - 1);
                }

                if (event.key === 'ArrowRight') {
                    showImage(currentIndex + 1);
                }
            });

            $('.slick-main-slider').slick({
                dots: true,
                infinite: true,
                speed: 300,
                slidesToShow: 3,
                slidesToScroll: 1,
                centerMode: true,
                centerPadding: '44px',
                responsive: [
                    {
                        breakpoint: 1024,
                        settings: {
                            slidesToShow: 2,
                            centerPadding: '32px'
                        }
                    },
                    {
                        breakpoint: 700,
                        settings: {
                            slidesToShow: 1,
                            centerPadding: '46px'
                        }
                    },
                    {
                        breakpoint: 480,
                        settings: {
                            slidesToShow: 1,
                            centerPadding: '0'
                        }
                    }
                ]
            });
        });
    </script>
</body>

</html>
