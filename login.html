<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>
<!-- css -->
<style>
    body {
        font-family: "Inter", sans-serif;
    }

    .login-page {
        display: flex;
        gap: 50px;
        align-items: center;
    }

    .login-left img {
        width: 100%;
    }

    .login-left,
    .login-right {
        width: 50%;
    }

    .login-right h2 {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 36px;
        line-height: 44px;
        text-transform: capitalize;
        color: #426162;
    }

    .login-right h2 {
        font-family: "Playfair Display", serif;
        font-weight: 900;
    }

    .group-text {
        display: grid;
        gap: 10px;
        margin-bottom: 20px;
    }

    .group-text label {
        font-size: 16px;
        line-height: 24px;
        color: #426162;
        font-weight: 500;
    }

    .group-text input {
        width: 100%;
        height: 30px;
    }

    .loging-bootom {
        display: grid;
        gap: 15px;
    }

    .loging-bootom a {
        text-align: center;
        color: #426162;
        text-decoration: none;
    }

    .loging-bootom button.submit {
        width: 100%;
        background-color: #029A9F;
        border: 1px solid #029A9F;
        color: #fff;
        padding: 10px 20px;
        font-size: 16px;
        line-height: 24px;
        letter-spacing: 0.5px;
        border-radius: 8px;
    }

    .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 50px 20px;
    }

    @media only screen and (max-width: 768px) {
        .login-page {
            flex-wrap: wrap;
            gap: 20px;
        }

        .login-left,
        .login-right {
            width: 100%;
        }
    }
</style>

<body>
    <div class="container">
        <div class="login-page">
            <div class="login-left">
                <img src="./image 1.png" alt="left-image">
            </div>
            <div class="login-right">
                <h2>welcome Back</h2>
                <form action="" class="login-form">
                    <div class="group-text">
                        <label for="">Email Address</label>
                        <input type="text">
                    </div>
                    <div class="group-text">
                        <label for="">Email Address</label>
                        <input type="text">
                    </div>
                    <div class="loging-bootom">
                        <a href="#">forgot password</a>
                        <button type="submit" class="submit">login</button>
                        <a href="#">Don't have an account? Register</a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</body>

</html>
