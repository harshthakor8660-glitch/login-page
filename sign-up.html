<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>
<!-- css -->
<style>
    body {
        font-family: "Inter", sans-serif;
    }

    .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 50px 20px;
    }

    .signup-page {
        display: flex;
        gap: 50px;
        align-items: center;
    }

    .signup-left img {
        width: 100%;
    }

    .signup-left,
    .signup-right {
        width: 50%;
    }

    .signup-right h2 {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 36px;
        line-height: 44px;
        text-transform: capitalize;
        color: #426162;
    }

    .signup-right h2 {
        font-family: "Playfair Display", serif;
        font-weight: 900;
    }

    .group-text {
        display: grid;
        gap: 10px;
        margin-bottom: 20px;
    }

    .group-text label {
        font-size: 16px;
        line-height: 24px;
        color: #426162;
        font-weight: 500;
        text-transform: capitalize;
    }

    .group-text input {
        width: 100%;
        height: 48px;
        border: 1px solid #029A9F;
        border-radius: 6px;
        padding: 0 16px;
    }

    .signup-bootom {
        display: grid;
        gap: 15px;
        margin-top: 20px;
    }

    .signup-bootom a {
        text-align: center;
        color: #426162;
        text-decoration: none;
    }

    .signup-bootom button.submit {
        width: 100%;
        background-color: #029A9F;
        border: 1px solid #029A9F;
        color: #fff;
        padding: 10px 20px;
        font-size: 16px;
        line-height: 24px;
        letter-spacing: 0.5px;
        border-radius: 8px;
    }

    button.submit.sign-up {
        border: 1px solid #D5D5D5;
        background: #F3F3F3;
        color: #005558;
        display: flex;
        align-items: center;
        text-align: center;
        justify-content: center;
        gap: 10px;
        height: 50px;
    }

    @media only screen and (max-width: 768px) {
        .signup-page {
            flex-wrap: wrap;
            gap: 20px;
        }

        .signup-right h2 {
            font-size: 24px;
            line-height: 34px;
        }

        .signup-left,
        .signup-right {
            width: 100%;
        }
    }
</style>

<body>
    <div class="container">
        <div class="signup-page">
            <div class="signup-left">
                <img src="./image 1.png" alt="left-image">
            </div>
            <div class="signup-right">
                <h2>Sign up</h2>
                <form action="" class="login-form">
                    <div class="group-text">
                        <label for="">first name</label>
                        <input type="text">
                    </div>
                    <div class="group-text">
                        <label for="">last name</label>
                        <input type="text">
                    </div>
                    <div class="group-text">
                        <label for="">Email</label>
                        <input type="email">
                    </div>
                    <div class="group-text">
                        <label for="">password</label>
                        <input type="type">
                    </div>
                    <div class="group-text">
                        <label for="">phonenumber</label>
                        <input type="type">
                    </div>
                    <div class="terms-btn">
                        <input type="checkbox" id="subscribe" name="terms" value="yes">
                        <label for="terms">I agree with the Terms & Condition</label>
                    </div>
                    <div class="signup-bootom">

                        <button type="submit" class="submit">continue</button>
                        <a href="#">or</a>
                        <button type="submit" class="submit sign-up"><img src="./search.png" alt="google">sign up with
                            google</button>
                        <a href="#">already have an account? login</a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</body>

</html>
